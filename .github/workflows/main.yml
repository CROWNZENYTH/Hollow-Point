name: Build Hollow Point DLL

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Pull Missing Game Files
      run: |
        mkdir -y refs
        wget -O refs/Assembly-CSharp.dll https://github.com/ricardosouzag/ModInstaller/raw/master/Mods/Assembly-CSharp.dll || true

    - name: Build Mod
      run: dotnet build -c Release
      env:
        ReferencePath: ${{ github.workspace }}/refs/

    - name: Upload Finished Mod
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-HollowPoint
        path: bin/Release/**/HollowPoint.dll
